name: PR automerge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  check_suite:
    types: [completed]
  check_run:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-automerge-${{ github.event.pull_request.number || github.event.check_run.pull_requests[0].number || github.event.check_suite.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'check_run' && github.event.check_run.pull_requests[0].number) ||
      (github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0].number)
    runs-on: ubuntu-latest
    steps:
      - name: Determine PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHECK_RUN_PR: ${{ github.event.check_run.pull_requests[0].number }}
          CHECK_SUITE_PR: ${{ github.event.check_suite.pull_requests[0].number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          elif [ -n "$CHECK_RUN_PR" ]; then
            echo "number=$CHECK_RUN_PR" >> "$GITHUB_OUTPUT"
          elif [ -n "$CHECK_SUITE_PR" ]; then
            echo "number=$CHECK_SUITE_PR" >> "$GITHUB_OUTPUT"
          else
            echo "No PR number found"
            exit 1
          fi

      - name: Skip draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          is_draft=$(gh pr view "$PR" --json isDraft --jq '.isDraft')
          if [ "$is_draft" = "true" ]; then
            echo "Draft PR, skipping auto-merge enable"
            exit 0
          fi
          echo "PR is ready for auto-merge evaluation"

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set +e
          gh pr merge "$PR" --auto --squash
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "Auto-merge not enabled. This is non-fatal if branch protection or approvals are still pending."
          fi
