name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── 0. Validate tag matches Cargo.toml version ────────────────────────────
  validate-tag:
    name: Validate tag vs Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          CARGO_VER=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          EXPECTED_TAG="v${CARGO_VER}"

          echo "Git tag:        $TAG"
          echo "Cargo version:  $CARGO_VER  (expected tag: $EXPECTED_TAG)"

          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo ""
            echo "ERROR: Tag '${TAG}' does not match Cargo.toml version '${CARGO_VER}'."
            echo "  Either bump the version in Cargo.toml to match the tag,"
            echo "  or push tag '${EXPECTED_TAG}' instead."
            exit 1
          fi

      - name: Verify all three versions match
        run: |
          CORE_VER=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          BIN_VER=$(grep '^version' crates/jira/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PLUGIN_VER=$(python3 -c "import json,sys; print(json.load(open('plugin/.claude-plugin/plugin.json'))['version'])")

          if [ "$CORE_VER" != "$BIN_VER" ] || [ "$CORE_VER" != "$PLUGIN_VER" ]; then
            echo "ERROR: Version mismatch before release!"
            echo "  jira-core:     $CORE_VER"
            echo "  jira-commands: $BIN_VER"
            echo "  plugin:        $PLUGIN_VER"
            exit 1
          fi

      - name: Verify CHANGELOG.md has entry for this version
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if ! grep -qF "[${VERSION}]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no entry for v${VERSION}. Add one before releasing."
            exit 1
          fi

  # ── 1. Build binaries ─────────────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: jira-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: jira-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: jira-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: jira-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: jira-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig + cargo-zigbuild (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          pip3 install ziglang --break-system-packages
          cargo install cargo-zigbuild --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (zigbuild — Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu.2.17 -p jira-commands

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p jira-commands

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/jira ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/jira.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish jira-core
        run: cargo publish -p jira-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Wait for crates.io index before publishing binary that depends on jira-core
      - run: sleep 90
      - name: Publish jira-commands (binary crate)
        run: cargo publish -p jira-commands --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-crates]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            file="${dir%/}"
            sha256sum "$file/$file" >> ../checksums.txt 2>/dev/null || \
            sha256sum "$file/$file.exe" >> ../checksums.txt 2>/dev/null || true
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            checksums.txt
