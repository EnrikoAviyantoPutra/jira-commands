name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Docs & version consistency ──────────────────────────────────────────
  docs-check:
    name: Docs & version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency (jira-core == jira-commands == plugin)
        run: |
          CORE_VER=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          BIN_VER=$(grep '^version' crates/jira/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PLUGIN_VER=$(python3 -c "import json,sys; print(json.load(open('plugin/.claude-plugin/plugin.json'))['version'])")

          echo "jira-core:     $CORE_VER"
          echo "jira-commands: $BIN_VER"
          echo "plugin:        $PLUGIN_VER"

          if [ "$CORE_VER" != "$BIN_VER" ] || [ "$CORE_VER" != "$PLUGIN_VER" ]; then
            echo ""
            echo "ERROR: Version mismatch! All three must be equal."
            echo "  Fix: bump version in crates/jira-core/Cargo.toml,"
            echo "       crates/jira/Cargo.toml (package + jira-core dep),"
            echo "       and plugin/.claude-plugin/plugin.json"
            exit 1
          fi

      - name: Check CHANGELOG.md has entry for current version
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if ! grep -qF "[${VERSION}]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md is missing an entry for v${VERSION}."
            echo "  Add a '## [${VERSION}] — YYYY-MM-DD' section to CHANGELOG.md."
            exit 1
          fi

      - name: Check README.md jira-core version is up to date
        run: |
          VERSION=$(grep '^version' crates/jira-core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          if ! grep -qF "jira-core = \"${MAJOR_MINOR}\"" README.md; then
            echo "ERROR: README.md library example still references an old jira-core version."
            echo "  Update 'jira-core = \"..\"' to \"${MAJOR_MINOR}\" in the README."
            exit 1
          fi

      - name: Install Rust stable (for dry-run publish check)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo publish --dry-run (jira-core)
        run: cargo publish --dry-run -p jira-core

      - name: cargo publish --dry-run (jira-commands)
        run: cargo publish --dry-run -p jira-commands

  # ── 2. Build, lint, test ───────────────────────────────────────────────────
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all

      - name: Build
        run: cargo build --all
